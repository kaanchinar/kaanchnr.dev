<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
	<style>
		.shape { fill: none; stroke: #0a0a0a; }
		.fill { fill: #0a0a0a; stroke: none; }
		.txt { fill: #0a0a0a; }
		@media (prefers-color-scheme: dark) {
			.shape { stroke: #fafafa; }
			.fill { fill: #fafafa; }
			.txt { fill: #fafafa; }
		}
	</style>

	<!-- base rounded frame -->
	<rect x="2" y="2" width="28" height="28" rx="6" class="shape" stroke-width="1.6" />

	<!-- sharp sting accents, top-left and bottom-right, diagonal symmetry -->
	<path class="fill" d="M2 9.5 V2 H9.5 Z" />
	<path class="fill" d="M30 22.5 V30 H22.5 Z" />

	<!-- initials -->
	<text
		x="16.2"
		y="21.5"
		text-anchor="middle"
		font-family="'JetBrains Mono', 'Space Mono', ui-monospace, 'SF Mono', Consolas, monospace"
		font-size="12.5"
		font-weight="700"
		letter-spacing="0.5"
		class="txt"
	>KC</text>
</svg>
